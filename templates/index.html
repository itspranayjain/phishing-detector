<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phishing Detection System</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            height: 100vh;
        }
        .card {
            border-radius: 15px;
        }
        .result-safe {
            color: #00ffcc;
        }
        .result-warning {
            color: #ffc107;
        }
        .result-danger {
            color: #ff4d4d;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            <div class="card p-4 shadow-lg bg-dark">
                <h2 class="text-center mb-4">🔐 Phishing URL Detector</h2>

                <form action="/predict" method="post">
                    <div class="mb-3">
                        <input type="text" name="url" class="form-control" placeholder="Enter URL..." required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Analyze URL</button>
                    </div>
                </form>

                {% if prediction_text %}
                <div class="mt-4 text-center">
                    <h4 class="
                        {% if 'Safe' in prediction_text %} result-safe
                        {% elif 'Suspicious' in prediction_text %} result-warning
                        {% else %} result-danger
                        {% endif %}
                    ">
                        {{ prediction_text }}
                    </h4>

                    {% if probability %}
                    <p>Confidence: {{ probability }}%</p>
                    {% endif %}
                </div>
                {% endif %}

            </div>

        </div>
    </div>
</div>

</body>
</html>
